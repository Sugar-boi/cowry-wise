<body>
    <div class="" style="position: relative;">
        <div class="nav-img mb-5">
            <img src="download.svg" width="180">
        </div>




        <div class="page-layout d-flex ">
            <div class="container-fluid p-0 ">
                <div class="row row-row py-3 g-4">



                    <div class="leftee col-12 col-lg-5 ">
                        <h1>Jump right in</h1>
                        <h3>Sign in to continue</h3>
                        <p>New user? <a href="signup.html">Create account </a></p>
                    </div>

                    <div class="siden col-12 col-lg-7 ">

                        <div class="login-card p-4">

                            <div class="d-flex flex-row gap-3 mb-3 social-row  w-100">

                                <a href="#" class="social-btn w-50">
                                    <img src="download (1).svg" alt="">
                                    Sign up with Google
                                </a>
                                <a href="#" class="social-btn  w-50">
                                    <img src="download (3).svg"> Sign in with apple </a>
                            </div>
                            <div class=" d-flex align-items-center  or-divider my-4">
                                <hr class="flex-grow-1 m-0">
                                <span>or</span>
                                <hr class="flex-grow-1 m-0">
                            </div>

                            <div class="mb-4">
                                <input type="text" class="email-inpu form-control" placeholder="Email Address">
                            </div>

                            <div class="mb-2">
                                <div class="input-group">
                                    <input type="password" id="passwordInput" class="form-control border-end-0"
                                        placeholder="Password">
                                    <span class="input-group-text bg-white border-start-0" onclick="togglePassword()">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </span>
                                </div>
                            </div>
                            <a href="#" class="forgot-link "> Forgot password</a>

                            <button class="btn-continue btn btn-signin w-100 mt-4 mb-5">
                                Sign in
                            </button>
                        </div>


                        <div class="card-footer-row d-flex justify-content-between">
                            <div class="sec-badge">
                                <p>Trouble signing in? <a href="#"> Chat with us</a></p>
                            </div>
                            <div style="color: grey;">
                                privacy | terms
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
